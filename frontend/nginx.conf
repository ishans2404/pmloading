server {
  listen 8705;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Redirect bare root to the app
  location = / {
    return 301 /pmloading/;
  }

  # ── API proxy ─────────────────────────────────────────────────
  location /pmloading/api/ {
    proxy_pass         http://10.145.8.23:8706/api/;
    # proxy_pass         http://backend:8706/api/;
    proxy_http_version 1.1;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_read_timeout 900s;
    proxy_send_timeout 900s;
    proxy_buffering    off;
    proxy_cache        off;
    add_header         X-Accel-Buffering no;
  }

  # ── Service Worker — must NEVER be cached ─────────────────────
  # Browsers re-fetch this on every page load to detect updates.
  # Service-Worker-Allowed widens the SW scope to cover /pmloading/.
  location = /pmloading/sw.js {
    try_files $uri =404;
    expires    off;
    add_header Cache-Control        "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    add_header Service-Worker-Allowed "/pmloading/";
  }

  # ── Workbox runtime chunks ─────────────────────────────────────
  # Generated by vite-plugin-pwa alongside sw.js; also must not be cached.
  location ~* ^/pmloading/workbox-.+\.js$ {
    try_files $uri =404;
    expires    off;
    add_header Cache-Control "no-store";
  }

  # ── Web App Manifest ───────────────────────────────────────────
  # Short cache (1 day) so icon/name changes propagate quickly after redeploy.
  location ~* ^/pmloading/.*\.webmanifest$ {
    try_files $uri =404;
    add_header Content-Type  "application/manifest+json";
    add_header Cache-Control "public, max-age=86400";
  }

  # ── Vite content-hashed assets ─────────────────────────────────
  # Filename contains a hash, so immutable caching is safe.
  location /pmloading/assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # ── SPA fallback ───────────────────────────────────────────────
  location /pmloading/ {
    try_files $uri $uri/ /pmloading/index.html;
  }
}