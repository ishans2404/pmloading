<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BSP – Plate Loading System</title>

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/pmloading/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/pmloading/favicon.svg" />
    <link rel="shortcut icon" href="/pmloading/favicon.ico" />

    <!-- iOS home-screen icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/pmloading/apple-touch-icon.png" />

    <!--
      Web App Manifest.
      vite-plugin-pwa regenerates this file at build time (manifestFilename:
      'site.webmanifest') with the correct start_url, scope, icons, etc.
      The href below uses the absolute /pmloading/ path so it resolves
      correctly whether the browser is on the first load or any sub-route.
    -->
    <link rel="manifest" href="/pmloading/site.webmanifest" />

    <!-- Theme colour shown in mobile browser chrome -->
    <meta name="theme-color" content="#1b3865" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BSP Loading" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
